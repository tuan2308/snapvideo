  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --border: #dce8f7;

    nav {

      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 40px;
      background: rgba(244,248,255,0.88);
      backdrop-filter: blur(16px);

    }
    .nav-brand {

      font-weight: 800; font-size: 1.25rem;

    .nav-brand img { width: 36px; height: 36px; border-radius: 10px; }
    .nav-tag {
      font-size: 0.7rem; font-weight: 500;

    .hero {
      position: relative;
      display: flex; flex-direction: column; align-items: center;

      padding: 96px 24px 72px;
      z-index: 1;
    }
    .hero-icon {
      width: 96px; height: 96px;
      border-radius: 24px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06),
                  0 20px 60px rgba(1,105,217,0.18),
                  0 4px 12px rgba(0,0,0,0.10);
      margin-bottom: 28px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .hero h1 {
      font-family: 'Be Vietnam Pro', sans-serif;

    .hero-actions {
      display: flex;
      flex-direction: column;

      justify-content: center;
      gap: 12px;
    }
    .btn-shortcut,
    .btn-api {
      display: inline-flex; align-items: center; gap: 10px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      letter-spacing: 0.01em;
      padding: 14px 28px;
      border-radius: 14px;
      text-decoration: none;
      border: none; cursor: pointer;
      transition: all 0.2s ease;
      position: relative; overflow: hidden;
    }
    .btn-shortcut {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 8px 30px rgba(1,105,217,0.32);
    }
    .btn-shortcut::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      pointer-events: none;
    }
    .btn-api {
      background: #fff;
      color: var(--accent);
      border: 1px solid rgba(1,105,217,0.24);
      box-shadow: 0 8px 24px rgba(13,26,46,0.08);
    }
    .btn-shortcut:hover,
    .btn-api:hover {
      transform: translateY(-2px);
    }
    .btn-shortcut:hover {
      box-shadow: 0 12px 40px rgba(1,105,217,0.44);
    }
    .btn-api:hover {
      border-color: rgba(1,105,217,0.38);
      box-shadow: 0 12px 32px rgba(13,26,46,0.12);
    }
    .btn-shortcut:active,
    .btn-api:active { transform: translateY(0); }
    .btn-shortcut svg,
    .btn-api svg { width: 18px; height: 18px; flex-shrink: 0; }
    .btn-shortcut.is-loading,
    .btn-shortcut.is-disabled {
      pointer-events: none;
      opacity: 0.72;
    }
    .btn-shortcut.is-loading svg { display: none; }
    .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.42);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .btn-shortcut.is-loading .btn-spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-divider {
      display: flex; align-items: center; gap: 16px;
      max-width: 900px; margin: 0 auto 40px;
      padding: 0 24px;
    }
    .section-divider span {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 700; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--muted); white-space: nowrap;
    }
    .section-divider::before, .section-divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .table-section {
      max-width: 900px; margin: 0 auto 80px;
      padding: 0 24px;
    }
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(1,105,217,0.08), 0 1px 4px rgba(0,0,0,0.06);
    }
    .table-header-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(1,105,217,0.04);
    }
    .table-title {
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 700; font-size: 0.95rem;
      color: var(--text);
    }
    .status-dot {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.78rem; color: var(--success);
    }
    .status-dot::before {
      content: '';
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    table { width: 100%; border-collapse: collapse; }
    thead tr { background: rgba(0,0,0,0.02); }
    th {
      padding: 13px 20px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--muted); text-align: left;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 20px;
      font-size: 0.9rem; color: var(--text);
      border-bottom: 1px solid rgba(220,232,247,0.8);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(1,105,217,0.04); }
    .update-info {
      white-space: pre-line;
      line-height: 1.6;
    }
    .ver-badge {
      display: inline-block;
      background: rgba(1,105,217,0.09);
      color: var(--accent);
      border: 1px solid rgba(1,105,217,0.20);
      border-radius: 8px;
      padding: 3px 10px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-weight: 700; font-size: 0.82rem;
      letter-spacing: 0.03em;
    }
    .empty-row td {
      text-align: center; padding: 40px;
      color: var(--muted); font-size: 0.9rem;
    }
    footer {
      text-align: center; padding: 32px;
      color: var(--muted); font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
    footer span { color: var(--accent); }
  </style>

<body>

  <nav>
    <div class="nav-brand">
      <img src="./logo.png" alt="Biểu tượng Snap Video">
      Snap Video
    </div>
    <div class="nav-tag">Phím tắt</div>
  </nav>

  <section class="hero">
    <img class="hero-icon" src="./Shortcuts.png" alt="Snap Video">
    <h1>Nhận phím tắt<br>Snap Video</h1>
    <p>Lưu video tức thì. Cách nhanh nhất để tải nội dung trực tiếp về thư viện của bạn.</p>
    <div class="hero-actions">
      <a id="shortcutBtn" class="btn-shortcut is-loading" href="#" target="_blank" rel="noopener" aria-disabled="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
        <span class="btn-spinner" aria-hidden="true">&nbsp;</span>
        <span class="btn-label">Đang tải...</span>
      </a>
      <a class="btn-api" href="https://rapidapi.com/tuan2308/api/snap-video3" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 9l-4 3 4 3"/>
          <path d="M16 9l4 3-4 3"/>
          <path d="M14 5l-4 14"/>
        </svg>
        <span>API</span>
      </a>
    </div>
  </section>

  <div class="section-divider">
    <span>Nhật ký cập nhật</span>
  </div>

  <div class="table-section">
    <div class="table-wrap">
      <div class="table-header-bar">
        <span class="table-title">Lịch sử phiên bản</span>
        <span class="status-dot" id="statusText">Đang tải...</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Phiên bản</th>
            <th>Nội dung cập nhật</th>
          </tr>
        </thead>
        <tbody id="sheetRows">
          <tr class="empty-row">
            <td colspan="2">Đang tải dữ liệu...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer>
    <span>Snap Video</span>
  </footer>

  <script>
 const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1n-6n5S2EobNsPT_jBf6iYmYgzV-r8pmos6VZjCW9Dqw/gviz/tq?tqx=out:json&tq&gid=0';

function getCell(row, index) {
    return row?.c?.[index]?.v ?? '';
}

function versionParts(version) {
    return String(version)
        .trim()
        .replace(/^v/i, '')
        .split('.')
        .map(part => Number.parseInt(part, 10) || 0);
}

function compareVersions(a, b) {
    const left = versionParts(a);
    const right = versionParts(b);
    const length = Math.max(left.length, right.length);

    for (let i = 0; i < length; i += 1) {
        const diff = (left[i] || 0) - (right[i] || 0);

        if (diff !== 0) {
            return diff;
        }
    }

    return 0;
}

function getLatestRow(rows) {
    return rows
        .filter(row => getCell(row, 0) && getCell(row, 3))
        .sort((a, b) => compareVersions(getCell(b, 0), getCell(a, 0)))[0];
}

function escapeHtml(value) {
    return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function formatUpdateInfo(value) {
    return escapeHtml(value).replace(/\\r\\n|\\n|\\r/g, '\n');
}

async function loadSheet() {
    const shortcutBtn = document.getElementById('shortcutBtn');
    const shortcutLabel = shortcutBtn.querySelector('.btn-label');
    const sheetRows = document.getElementById('sheetRows');
    const statusText = document.getElementById('statusText');

    try {
        const res = await fetch(SHEET_URL);
        const text = await res.text();

        const json = JSON.parse(
            text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1)
        );

        const rows = json.table.rows || [];

        const latestRow = getLatestRow(rows);
        const latestUrl = getCell(latestRow, 4);

        if (latestUrl) {
            shortcutBtn.href = latestUrl;
            shortcutBtn.classList.remove('is-loading', 'is-disabled');
            shortcutBtn.removeAttribute('aria-disabled');
            shortcutLabel.textContent = 'Nhận phím tắt';
        } else {
            shortcutBtn.classList.remove('is-loading');
            shortcutBtn.classList.add('is-disabled');
            shortcutBtn.setAttribute('aria-disabled', 'true');
            shortcutLabel.textContent = 'Không khả dụng';
        }

        let html = '';

        rows.forEach(row => {
            const version = getCell(row, 0) || '-';
            const updateInfo = getCell(row, 1) || getCell(row, 1) || '-';

            html += `
                <tr>
                    <td><span class="ver-badge">${escapeHtml(version)}</span></td>
                    <td class="update-info">${formatUpdateInfo(updateInfo)}</td>
                </tr>
            `;
        });

        sheetRows.innerHTML =
            html || `<tr class="empty-row"><td colspan="2">Không có dữ liệu</td></tr>`;
        statusText.textContent = latestRow ? `Mới nhất ${getCell(latestRow, 0)}` : 'Không có dữ liệu';

    } catch (err) {
        sheetRows.innerHTML =
            `<tr class="empty-row"><td colspan="2">Không thể tải dữ liệu</td></tr>`;
        statusText.textContent = 'Tải thất bại';
        shortcutBtn.classList.remove('is-loading');
        shortcutBtn.classList.add('is-disabled');
        shortcutBtn.setAttribute('aria-disabled', 'true');
        shortcutLabel.textContent = 'Không khả dụng';
    }
}

loadSheet();
  </script>
