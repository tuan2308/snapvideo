  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --border: #dce8f7;
      --accent: #0169d9;
      --accent2: #0191f7;
      --text: #0d1a2e;
      --muted: #6b7fa3;
      --display-font: 'Syne', sans-serif;
    }

    html[lang="vi"] {
      --display-font: 'Be Vietnam Pro', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(1,105,217,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(244,248,255,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--display-font);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }

    .nav-tag {
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(1,105,217,0.12);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid rgba(1,105,217,0.22);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 88px 24px 80px;
    }

    .guide-shell {
      display: grid;
      gap: 28px;
      justify-items: center;
      text-align: center;
    }

    .guide-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06),
                  0 20px 60px rgba(1,105,217,0.18),
                  0 4px 12px rgba(0,0,0,0.10);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      max-width: 820px;
      font-family: var(--display-font);
      font-weight: 800;
      font-size: clamp(2.15rem, 5vw, 4.15rem);
      letter-spacing: -0.04em;
      line-height: 1.08;
      background: linear-gradient(135deg, #0d1a2e 20%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .guide-card {
      width: 100%;
      max-width: 760px;
      margin-top: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(1,105,217,0.08), 0 1px 4px rgba(0,0,0,0.06);
      text-align: left;
      overflow: hidden;
    }

    .guide-content {
      display: grid;
      gap: 18px;
      padding: 30px 32px 34px;
    }

    .guide-intro {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }

    .method-list {
      display: grid;
      gap: 14px;
    }

    .method {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: rgba(1,105,217,0.035);
    }

    .method h2 {
      font-family: var(--display-font);
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 8px;
    }

    .method p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer span {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      nav {
        padding: 14px 20px;
      }

      .nav-brand {
        font-size: 1.05rem;
      }

      .nav-tag {
        display: none;
      }

      main {
        padding: 64px 18px 64px;
      }

      .guide-card {
        border-radius: 16px;
      }

      .guide-content {
        padding: 24px 22px 28px;
      }
    }
  </style>

          <div class="method-list">
            <section class="method">
              <h2 data-i18n="usageGuide.method1Title">Method 1</h2>
              <p data-i18n="usageGuide.method1Text">Press the shortcut directly => Paste the video link</p>
            </section>

            <section class="method">
              <h2 data-i18n="usageGuide.method2Title">Method 2</h2>
              <p data-i18n="usageGuide.method2Text">Go to the app from which you want to download video, for example TikTok => Press the share icon => Add... => Snap Video</p>
            </section>
          </div>
        </div>
      </div>
    </article>
  </main>

  <footer>
    <span data-i18n="common.footerBrand">Snap Video</span>
  </footer>
