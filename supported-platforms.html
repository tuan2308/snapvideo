<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <meta name="googlebot" content="noindex">
  <title>Supported Platforms - Snap Video</title>
  <style>
    :root {
      --bg: #f4f8ff;
      --bg2: #eaf2fd;
      --card: #ffffff;
      --border: #dce8f7;
      --accent: #0169d9;
      --accent2: #0191f7;
      --text: #0d1a2e;
      --muted: #6b7fa3;
      --success: #10b981;
      --danger: #ef4444;
      --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      --display-font: var(--font-family);
      --radius: 20px;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
      color: var(--text);
      font-family: var(--font-family);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(1,105,217,0.14) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(244,248,255,0.75);
      backdrop-filter: blur(16px) saturate(160%);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--display-font);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }

    .nav-tag {
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(1,105,217,0.12);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid rgba(1,105,217,0.22);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 760px;
      margin: 0 auto;
      padding: 88px 24px 80px;
    }

    .platform-shell {
      display: grid;
      gap: 24px;
      justify-items: center;
      text-align: center;
    }

    .platform-icon {
      width: 76px;
      height: 76px;
      border-radius: 20px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06),
                  0 20px 60px rgba(1,105,217,0.20),
                  0 4px 12px rgba(0,0,0,0.10);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      max-width: 620px;
      font-family: var(--display-font);
      font-weight: 800;
      font-size: clamp(1.9rem, 4.5vw, 3.1rem);
      letter-spacing: -0.03em;
      line-height: 1.2;
      background: linear-gradient(135deg, #0d1a2e 20%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .platform-subtitle {
      max-width: 480px;
      margin-top: -8px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .platform-card {
      width: 100%;
      margin-top: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 30px rgba(1,105,217,0.10), 0 1px 4px rgba(0,0,0,0.05);
      overflow: hidden;
    }

    .platform-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 26px;
      background: linear-gradient(135deg, rgba(1,105,217,0.06), rgba(1,145,247,0.03));
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .summary-title {
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
    }

    .summary-count {
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 44px;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 0.85rem;
      box-shadow: 0 4px 12px rgba(1,105,217,0.30);
    }

    .platform-grid {
      display: grid;
      background: var(--card);
    }

    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 17px 26px;
      background: var(--card);
      border-bottom: 1px solid rgba(220,232,247,0.7);
      text-align: left;
      transition: background 0.15s ease;
    }

    .platform-item:last-child {
      border-bottom: none;
    }

    .platform-item:hover {
      background: rgba(1,105,217,0.045);
    }

    .platform-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 0.98rem;
      color: var(--text);
      line-height: 1.35;
    }

    .platform-dot {
      flex-shrink: 0;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(16,185,129,0.15);
    }

    .platform-item.is-disabled .platform-dot {
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(239,68,68,0.15);
    }

    .platform-status {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 5px 12px;
      background: rgba(16,185,129,0.10);
      color: #047857;
      border: 1px solid rgba(16,185,129,0.22);
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .platform-item.is-disabled .platform-status {
      background: rgba(239,68,68,0.10);
      color: #b91c1c;
      border-color: rgba(239,68,68,0.22);
    }

    .platform-message {
      padding: 48px 24px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      background: var(--card);
    }

    .platform-message.is-loading::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      margin-right: 8px;
      vertical-align: -3px;
      border: 2px solid rgba(1,105,217,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .footer-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px 18px; }
    .footer-links a { color: var(--muted); text-decoration: none; transition: color .15s; }
    .footer-links a:hover { color: var(--accent); }

    @media (max-width: 640px) {
      nav {
        padding: 14px 20px;
      }

      .nav-brand {
        font-size: 1.05rem;
      }

      .nav-tag {
        display: none;
      }

      main {
        padding: 56px 16px 56px;
      }

      .platform-card {
        border-radius: 16px;
      }

      .platform-summary {
        align-items: flex-start;
        gap: 10px;
      }

      .platform-item {
        padding: 15px 18px;
      }
    }
  </style>

</head>
<body>
  <nav>
    <a class="nav-brand" href="./index.html" aria-label="Snap Video Home">
      <img src="./imgs/logo.png" alt="Snap Video Icon">
      Snap Video
    </a>
    <div class="nav-tag">Platforms</div>
  </nav>

  <main>
    <article class="platform-shell">
      <img class="platform-icon" src="./imgs/Shortcuts.png" alt="Snap Video">
      <h1 id="platformTitle">Supported Platforms</h1>
      <p class="platform-subtitle">Real-time availability for every platform Snap Video can download from.</p>

      <div class="platform-card">
        <div class="platform-summary">
          <span class="summary-title" id="platformSummary">Loading platform data...</span>
          <span class="summary-count" id="platformCount">0</span>
        </div>
        <div class="platform-grid" id="platformGrid">
          <div class="platform-message is-loading">Loading platform data...</div>
        </div>
      </div>
    </article>
  </main>

  <footer>
    <div class="footer-links" role="navigation" aria-label="Footer navigation">
      <a href="./index.html" data-i18n="common.footerHome">Home</a>
      <a href="./how-to-use-snap-video.html" data-i18n="common.footerGuide">How to use</a>
      <a href="./how-to-hide-menu.html" data-i18n="common.footerMenu">Hide menu</a>
      <a href="./how-to-fix-the-shortcut-not-appearing-in-the-share-sheet.html" data-i18n="common.footerShare">Share Sheet missing?</a>
      <a href="./supported-platforms.html" data-i18n="common.footerPlatforms">Supported platforms</a>
      <a href="./remove-limit.html" data-i18n="common.footerUnlock">Remove limit</a>
    </div>
  </footer>

  <script src="./site.js?v=3"></script>
  <script>
    (function () {
      const API_URL = 'https://api.snapvideo.co/support/list-platform.php';
      const params = new URLSearchParams(window.location.search);
      const requestedLang = params.get('lang') || params.get('locale') || '';
      const browserLang = (navigator.language || 'en').split('-')[0];
      const lang = (requestedLang || browserLang || 'en').toLowerCase();
      const titleEl = document.getElementById('platformTitle');
      const summaryEl = document.getElementById('platformSummary');
      const countEl = document.getElementById('platformCount');
      const gridEl = document.getElementById('platformGrid');

      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

      function setMessage(message) {
        gridEl.innerHTML = '';
        const messageEl = document.createElement('div');
        messageEl.className = 'platform-message';
        messageEl.textContent = message;
        gridEl.appendChild(messageEl);
      }

      function renderPlatforms(data) {
        const platforms = Array.isArray(data.platforms) ? data.platforms : [];
        const title = data.title || 'Supported Platforms';
        const total = Number.isFinite(Number(data.total)) ? Number(data.total) : platforms.length;

        titleEl.textContent = title;
        summaryEl.textContent = title;
        countEl.textContent = total;
        document.title = `${title} - Snap Video`;

        if (!platforms.length) {
          setMessage('No platform data.');
          return;
        }

        gridEl.innerHTML = '';
        platforms.forEach((item) => {
          const row = document.createElement('section');
          const name = document.createElement('div');
          const dot = document.createElement('span');
          const label = document.createElement('span');
          const status = document.createElement('div');

          row.className = `platform-item${item.enabled ? '' : ' is-disabled'}`;
          name.className = 'platform-name';
          dot.className = 'platform-dot';
          status.className = 'platform-status';
          label.textContent = item.name || item.platform || '-';
          status.textContent = item.status || (item.enabled ? 'Active' : 'Inactive');

          name.append(dot, label);
          row.append(name, status);
          gridEl.appendChild(row);
        });
      }

      async function loadPlatforms() {
        try {
          const url = new URL(API_URL);
          url.searchParams.set('lang', lang);
          const response = await fetch(url, { cache: 'no-cache' });

          if (!response.ok) {
            throw new Error('Unable to load platform data');
          }

          renderPlatforms(await response.json());
        } catch (error) {
          summaryEl.textContent = 'Load failed';
          setMessage('Unable to load platform data.');
        }
      }

      loadPlatforms();
    })();
  </script>
