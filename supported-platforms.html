<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <meta name="googlebot" content="noindex">
  <title>Supported Platforms - Snap Video</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600;700;800&amp;family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f8ff;
      --card: #ffffff;
      --border: #dce8f7;
      --accent: #0169d9;
      --accent2: #0191f7;
      --text: #0d1a2e;
      --muted: #6b7fa3;
      --success: #10b981;
      --danger: #ef4444;
      --display-font: 'Syne', sans-serif;
    }

    html[lang="vi"] {
      --display-font: 'Be Vietnam Pro', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(1,105,217,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
      background: rgba(244,248,255,0.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--display-font);
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand img {
      width: 36px;
      height: 36px;
      border-radius: 10px;
    }

    .nav-tag {
      font-size: 0.7rem;
      font-weight: 500;
      background: rgba(1,105,217,0.12);
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid rgba(1,105,217,0.22);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 88px 24px 80px;
    }

    .platform-shell {
      display: grid;
      gap: 28px;
      justify-items: center;
      text-align: center;
    }

    .platform-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.06),
                  0 20px 60px rgba(1,105,217,0.18),
                  0 4px 12px rgba(0,0,0,0.10);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      max-width: 820px;
      font-family: var(--display-font);
      font-weight: 800;
      font-size: clamp(2.15rem, 5vw, 4.15rem);
      letter-spacing: -0.04em;
      line-height: 1.08;
      background: linear-gradient(135deg, #0d1a2e 20%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .platform-card {
      width: 100%;
      margin-top: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(1,105,217,0.08), 0 1px 4px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .platform-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      background: rgba(1,105,217,0.04);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }

    .summary-title {
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--text);
    }

    .summary-count {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(1,105,217,0.10);
      color: var(--accent);
      border: 1px solid rgba(1,105,217,0.20);
      font-family: var(--display-font);
      font-weight: 700;
      font-size: 0.85rem;
    }

    .platform-grid {
      display: block;
      background: var(--card);
    }

    .platform-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 20px;
      background: var(--card);
      border-bottom: 1px solid rgba(220,232,247,0.8);
      text-align: left;
    }

    .platform-item:last-child {
      border-bottom: none;
    }

    .platform-item:hover {
      background: rgba(1,105,217,0.04);
    }

    .platform-name {
      font-family: var(--display-font);
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }

    .platform-status {
      flex-shrink: 0;
      border-radius: 999px;
      padding: 4px 10px;
      background: rgba(16,185,129,0.10);
      color: #047857;
      border: 1px solid rgba(16,185,129,0.22);
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .platform-item.is-disabled .platform-status {
      background: rgba(239,68,68,0.10);
      color: #b91c1c;
      border-color: rgba(239,68,68,0.22);
    }

    .platform-message {
      padding: 42px 24px;
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      background: var(--card);
    }

    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px;
      color: var(--muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }

    footer span {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      nav {
        padding: 14px 20px;
      }

      .nav-brand {
        font-size: 1.05rem;
      }

      .nav-tag {
        display: none;
      }

      main {
        padding: 64px 18px 64px;
      }

      .platform-card {
        border-radius: 16px;
      }

      .platform-summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .platform-item {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
  <script>(function(s){s.dataset.zone='9418547',s.src='https://llvpn.com/tag.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
</head>
<body>
  <nav>
    <a class="nav-brand" href="./index.html" aria-label="Snap Video Home">
      <img src="./logo.png" alt="Snap Video Icon">
      Snap Video
    </a>
    <div class="nav-tag">Platforms</div>
  </nav>

  <main>
    <article class="platform-shell">
      <img class="platform-icon" src="./Shortcuts.png" alt="Snap Video">
      <h1 id="platformTitle">Supported Platforms</h1>

      <div class="platform-card">
        <div class="platform-summary">
          <span class="summary-title" id="platformSummary">Loading platform data...</span>
          <span class="summary-count" id="platformCount">0</span>
        </div>
        <div class="platform-grid" id="platformGrid">
          <div class="platform-message">Loading platform data...</div>
        </div>
      </div>
    </article>
  </main>

  <footer>
    <span>Snap Video</span>
  </footer>

  <script>
    (function () {
      const API_URL = 'https://api.snapvideo.co/support/list-platform.php';
      const params = new URLSearchParams(window.location.search);
      const requestedLang = params.get('lang') || params.get('locale') || '';
      const browserLang = (navigator.language || 'en').split('-')[0];
      const lang = (requestedLang || browserLang || 'en').toLowerCase();
      const titleEl = document.getElementById('platformTitle');
      const summaryEl = document.getElementById('platformSummary');
      const countEl = document.getElementById('platformCount');
      const gridEl = document.getElementById('platformGrid');

      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

      function setMessage(message) {
        gridEl.innerHTML = '';
        const messageEl = document.createElement('div');
        messageEl.className = 'platform-message';
        messageEl.textContent = message;
        gridEl.appendChild(messageEl);
      }

      function renderPlatforms(data) {
        const platforms = Array.isArray(data.platforms) ? data.platforms : [];
        const title = data.title || 'Supported Platforms';
        const total = Number.isFinite(Number(data.total)) ? Number(data.total) : platforms.length;

        titleEl.textContent = title;
        summaryEl.textContent = title;
        countEl.textContent = total;
        document.title = `${title} - Snap Video`;

        if (!platforms.length) {
          setMessage('No platform data.');
          return;
        }

        gridEl.innerHTML = '';
        platforms.forEach((item) => {
          const row = document.createElement('section');
          const name = document.createElement('div');
          const status = document.createElement('div');

          row.className = `platform-item${item.enabled ? '' : ' is-disabled'}`;
          name.className = 'platform-name';
          status.className = 'platform-status';
          name.textContent = item.name || item.platform || '-';
          status.textContent = item.status || (item.enabled ? 'Active' : 'Inactive');

          row.append(name, status);
          gridEl.appendChild(row);
        });
      }

      async function loadPlatforms() {
        try {
          const url = new URL(API_URL);
          url.searchParams.set('lang', lang);
          const response = await fetch(url, { cache: 'no-cache' });

          if (!response.ok) {
            throw new Error('Unable to load platform data');
          }

          renderPlatforms(await response.json());
        } catch (error) {
          summaryEl.textContent = 'Load failed';
          setMessage('Unable to load platform data.');
        }
      }

      loadPlatforms();
    })();
  </script>
